<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte Developing | Modern Digital Solutions</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- Inter Font -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }
        .logo span {
            color: var(--accent);
        }
        nav {
            list-style: none;
        }
        nav img {
            width: 32px;
            height: 32px;
        }
        footer {
            text-align: center;
            padding: 4rem 0;
            opacity: 0.5;
        }
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Byte<span>Developing</span></div>
            <nav>
                <li><img src="favicon.ico" alt="Logo"></li>
            </nav>
        </header>

        <!-- Placeholder for your Hero/Grid content -->
        <main style="text-align: center; padding: 5rem 0;">
            <h1>Modern Digital Solutions</h1>
            <p>Building the future, one byte at a time.</p>
        </main>

        <footer>
            &copy; 2024 Byte Developing.<br>
            Follow our progress on <a href="https://github.com/byt3-dev" target="_blank">GitHub</a>.
        </footer>
    </div>
</body>
</html>
